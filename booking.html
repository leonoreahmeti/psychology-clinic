<section class="booking-modern">

    <h1>Book Your Session</h1>

    <div class="booking-container">

        <!-- LEFT SIDE -->
        <div class="booking-left">

            <!-- STEP 1 -->
            <div class="step active" id="step1">
                <h2>Select Date & Time</h2>

                <input type="date" id="date">

                <select id="time">
                    <option value="">Select Time</option>
                    <option>10:00</option>
                    <option>11:00</option>
                    <option>12:00</option>
                    <option>14:00</option>
                    <option>16:00</option>
                </select>

                <button onclick="nextStep(1)">Next</button>
            </div>

            <!-- STEP 2 -->
            <div class="step" id="step2">
                <h2>Your Details</h2>

                <input type="text" id="name" placeholder="Your name">
                <input type="email" id="email" placeholder="Your email">

                <label class="terms">
                    <input type="checkbox" id="terms">
                    I agree to the <a href="terms.html">Terms & Conditions</a>
                </label>

                <button onclick="nextStep(2)">Next</button>
            </div>

            <!-- STEP 3 -->
            <div class="step" id="step3">

                <div class="summary">
                    <h3>Session Summary</h3>
                    <p><strong>Therapist:</strong> Nafie Sylejmani</p>
                    <p><strong>Service:</strong> Psychological Session</p>
                    <p><strong>Date:</strong> <span id="sum-date"></span></p>
                    <p><strong>Time:</strong> <span id="sum-time"></span></p>
                    <p><strong>Duration:</strong> 50 minutes</p>

                    <input type="text" placeholder="Promo Code">
                </div>

            </div>

        </div>

        <!-- RIGHT SIDE -->
        <div class="booking-right">

            <h3>Payment Method</h3>

            <div class="payment">
                <label>
                    <input type="radio" name="pay" checked>
                    Credit / Debit Card
                </label>

                <label>
                    <input type="radio" name="pay">
                    PayPal
                </label>
            </div>

            <button class="confirm-btn">Confirm Booking</button>

        </div>

    </div>
</section>
